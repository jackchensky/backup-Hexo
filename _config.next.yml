# NexT 8 theme configuration.
# Keep this file in the site root so the npm theme can be upgraded cleanly.

cache:
  enable: true

scheme: Mist
darkmode: false

favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png
  apple_touch_icon: /images/apple-touch-icon-next.png
  safari_pinned_tab: /images/logo.svg

creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: false

menu:
  home: / || fa fa-home
  categories: /categories/ || fa fa-th
  archives: /archives/ || fa fa-archive
  tags: /tags/ || fa fa-tags
  Blog: https://jackchen.cn || fa fa-coffee

menu_settings:
  icons: true
  badges: false

sidebar:
  position: left
  display: post
  offset: 12

avatar:
  url: /images/avatar.png
  rounded: false
  rotated: false

social:
  GitHub: https://github.com/jackchensky || fab fa-github
  Twitter: https://twitter.com/jackchensky || fab fa-twitter
  Weibo: http://weibo.com/jackchen || fab fa-weibo
  Douban: https://www.douban.com/people/jackchen || fa fa-star
  Zhihu: https://www.zhihu.com/people/jackchen || fa fa-tag

social_icons:
  enable: true
  icons_only: false
  transition: false

links_settings:
  icon: fa fa-link
  layout: block

links:
  轻素材: http://qingsucai.com/

toc:
  enable: true
  number: true
  wrap: false
  expand_all: false
  max_depth: 6

footer:
  icon:
    name: fa fa-user
    animated: false
    color: "#222"
  powered: true

excerpt_description: true
read_more_btn: true

post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: false
    another_day: true
  categories: true

tag_icon: false
post_navigation: left

text_align:
  desktop: justify
  mobile: justify

mobile_layout_economy: false

theme_color:
  light: "#222"
  dark: "#222"

codeblock:
  theme:
    light: default
    dark: stackoverflow-dark
  prism:
    light: prism
    dark: prism-dark
  copy_button:
    enable: false
  fold:
    enable: false
    height: 500
  language: false

back2top:
  enable: true
  sidebar: false
  scrollpercent: false

font:
  enable: true
  host:
  global:
    external: true
    family: Lato
    size:
  title:
    external: true
    family:
    size:
  headings:
    external: true
    family:
    size:
  posts:
    external: true
    family:
  codes:
    external: true
    family:

note:
  style: simple
  icons: false
  light_bg_offset: 0

tabs:
  sticky: false
  transition:
    tabs: false
    labels: true

fancybox: false
mediumzoom: false
lazyload: false

motion:
  enable: true
  async: false
  duration: 200
  transition:
    menu_item: fadeInDown
    post_block: fadeIn
    post_header: fadeInDown
    post_body: fadeInDown
    coll_header: fadeInLeft
    sidebar: fadeInUp

pace:
  enable: false
  color: blue
  theme: minimal

comments:
  style: tabs
  active:
  storage: true
  lazyload: false

livere_uid: MTAyMC8zNDI1Ny8xMDc5NA==

addtoany:
  enable: false
  buttons:

busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

algolia_search:
  enable: false
  hits:
    per_page: 10

local_search:
  enable: false
  top_n_per_article: 1
  unescape: false
  preload: false

vendors:
  internal: local
  plugins: cdnjs

css: css
js: js
images: images
